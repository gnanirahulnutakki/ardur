# These sample ClusterSPIFFEIDs require the SPIRE controller manager CRDs.
# If the controller manager is not deployed, translate each object into
# equivalent `spire-server entry create` commands during install time.
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: ardur-langchain
spec:
  spiffeIDTemplate: "spiffe://{{ .TrustDomain }}/ardur/langchain/ns/{{ .PodMeta.Namespace }}/sa/{{ .PodSpec.ServiceAccountName }}"
  podSelector:
    matchLabels:
      app.kubernetes.io/name: langchain-agent
      framework: langchain
  namespaceSelector:
    matchLabels:
      ardur.spiffe.io/enabled: "true"
  workloadSelectorTemplates:
  - "k8s:container-name:langchain-agent"
  - "k8s:pod-label:framework:langchain"
  ttl: 1h
  jwtTtl: 5m
---
