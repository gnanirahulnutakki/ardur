name: link-check

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/link-check.yml"
  schedule:
    - cron: "0 14 * * 1"  # Mondays 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Restore lychee cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          # Excludes:
          # - github.com/.../security/advisories/new: requires being
          #   signed in to GitHub; unauthenticated lychee gets a redirect
          #   that GitHub then 404s. Cannot be unblocked without
          #   authenticating the lychee runner.
          # (Discussions exclude removed 2026-04-28: Discussions are now
          # enabled on the repo so the discussions tab and category URLs
          # return 200 to unauthenticated callers.)
          args: >-
            --cache
            --max-cache-age 7d
            --no-progress
            --accept 200,206,429
            --exclude 'github\.com/.*/security/advisories/new(/.*)?$'
            './**/*.md'
          fail: true
