baseURL: "https://ArdurAI.github.io/ardur/"
title: "Ardur Evidence"
locale: "en-us"
enableRobotsTXT: true
disableKinds:
  - RSS
summaryLength: 28

params:
  repoURL: "https://github.com/ArdurAI/ardur"
  sourceRef: "dev"
  description: "Open-source runtime governance for AI agents — prove what your agents do, not just what they say."

menus:
  main:
    - name: "Get Started"
      pageRef: "/get-started"
      weight: 5
    - name: "How It Works"
      pageRef: "/how-it-works"
      weight: 10
    - name: "Proof"
      pageRef: "/proof"
      weight: 15
    - name: "Docs"
      pageRef: "/docs"
      weight: 40
    - name: "Roadmap"
      pageRef: "/roadmap"
      weight: 70
    - name: "GitHub"
      url: "https://github.com/ArdurAI/ardur"
      weight: 90
  footer:
    - name: "Get Started"
      pageRef: "/get-started"
      weight: 5
    - name: "How It Works"
      pageRef: "/how-it-works"
      weight: 10
    - name: "Proof"
      pageRef: "/proof"
      weight: 15
    - name: "Contribute"
      pageRef: "/contribute"
      weight: 30
    - name: "Source Mirror"
      pageRef: "/source"
      weight: 40

taxonomies:
  maturity: maturity
  claim_type: claim_types
  surface: surfaces
  framework: frameworks
  evidence_level: evidence_levels

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: false

caches:
  images:
    dir: ":cacheDir/images"
