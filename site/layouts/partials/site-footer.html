<footer class="site-footer">
  {{ $sourceRef := .Site.Params.sourceRef | default "dev" }}
  <div class="footer-statement">
    <strong>Ardur</strong>
    <p>Runtime governance and verifier-backed evidence for AI agents. Generated from source-backed docs; the repo remains the source of truth.</p>
    <p class="footer-ref">Source reference: {{ $sourceRef }}</p>
  </div>
  <div class="footer-links">
    {{ range .Site.Menus.footer }}
      <a href="{{ .URL | absURL }}">{{ .Name }}</a>
    {{ end }}
    <a href="{{ .Site.Params.repoURL }}">GitHub</a>
  </div>
</footer>
