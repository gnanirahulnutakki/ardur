{{ define "main" }}
  <section class="page-shell">
    <header class="page-heading">
      <p class="eyebrow">Filtered view</p>
      <h1>{{ .Title }}</h1>
    </header>
    <div class="list-grid">
      {{ range .Pages }}
        <article class="list-item">
          <p class="list-kicker">{{ .Section }}</p>
          <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
          {{ with .Description }}<p>{{ . }}</p>{{ end }}
        </article>
      {{ end }}
    </div>
  </section>
{{ end }}
