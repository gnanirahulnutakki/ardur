apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spiffe-csi-driver
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spiffe-csi-driver
    app.kubernetes.io/component: identity
    app.kubernetes.io/part-of: ardur
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: spiffe-csi-driver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spiffe-csi-driver
        app.kubernetes.io/component: identity
        app.kubernetes.io/part-of: ardur
    spec:
      serviceAccountName: spiffe-csi-driver
      # Pod-level seccomp/runtime-default to reduce kernel attack
      # surface even though the CSI driver requires privileged mode.
      # (FIX-9 hardening, 2026-04-28.)
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: spiffe-csi-driver
        # FIX-9 (2026-04-28): production deployments MUST digest-pin.
        # Resolve via:
        #   skopeo inspect docker://ghcr.io/spiffe/spiffe-csi-driver:0.2.10 \
        #     --format '{{.Digest}}'
        # Then replace ":0.2.10" with "@sha256:<digest>".
        image: ghcr.io/spiffe/spiffe-csi-driver:0.2.10
        imagePullPolicy: IfNotPresent
        args:
        - -workload-api-socket-dir
        - /spire-agent-socket
        - -csi-socket-path
        - /spiffe-csi/csi.sock
        env:
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: spire-agent-socket-dir
          mountPath: /spire-agent-socket
          readOnly: true
        - name: spiffe-csi-socket-dir
          mountPath: /spiffe-csi
        - name: mountpoint-dir
          mountPath: /var/lib/kubelet/pods
          mountPropagation: Bidirectional
      - name: node-driver-registrar
        # FIX-9 (2026-04-28): production deployments MUST digest-pin.
        # Resolve via:
        #   skopeo inspect docker://registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.13.0 \
        #     --format '{{.Digest}}'
        # Then replace ":v2.13.0" with "@sha256:<digest>".
        image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.13.0
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        args:
        - -csi-address=/spiffe-csi/csi.sock
        - -kubelet-registration-path=/var/lib/kubelet/plugins/csi.spiffe.io/csi.sock
        volumeMounts:
        - name: spiffe-csi-socket-dir
          mountPath: /spiffe-csi
        - name: kubelet-plugin-registration-dir
          mountPath: /registration
      volumes:
      - name: spire-agent-socket-dir
        hostPath:
          path: /run/spire/agent-sockets
          type: DirectoryOrCreate
      - name: spiffe-csi-socket-dir
        hostPath:
          path: /var/lib/kubelet/plugins/csi.spiffe.io
          type: DirectoryOrCreate
      - name: mountpoint-dir
        hostPath:
          path: /var/lib/kubelet/pods
          type: Directory
      - name: kubelet-plugin-registration-dir
        hostPath:
          path: /var/lib/kubelet/plugins_registry
          type: Directory
---
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: csi.spiffe.io
  labels:
    app.kubernetes.io/name: spiffe-csi-driver
    app.kubernetes.io/part-of: ardur
spec:
  attachRequired: false
  podInfoOnMount: true
  fsGroupPolicy: None
  volumeLifecycleModes:
  - Ephemeral
